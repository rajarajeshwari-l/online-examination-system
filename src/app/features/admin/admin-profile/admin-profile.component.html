<div class="oes-page-container oes-page-container--narrow">
  <oes-page-header title="My Profile" subtitle="Manage your administrator account details."></oes-page-header>

  <div class="oes-admin-profile__header oes-card">
    <oes-avatar [name]="form.controls.fullName.value" [size]="72"></oes-avatar>
    <div>
      <h2 class="oes-admin-profile__name">{{ form.controls.fullName.value }}</h2>
      <p class="oes-admin-profile__role">Administrator · {{ form.controls.department.value }}</p>
    </div>
  </div>

  <div class="oes-admin-profile__stats">
    <oes-stat-card icon="assignment" [value]="stats().totalExams" label="Exams Created" iconColor="#4f46e5" iconBackground="rgba(99,102,241,0.12)"></oes-stat-card>
    <oes-stat-card icon="groups" [value]="stats().totalStudents" label="Students Managed" iconColor="#0891b2" iconBackground="rgba(6,182,212,0.12)"></oes-stat-card>
    <oes-stat-card icon="fact_check" [value]="stats().totalAttempts" label="Total Attempts" iconColor="#059669" iconBackground="rgba(16,185,129,0.12)"></oes-stat-card>
  </div>

  <form [formGroup]="form" (ngSubmit)="saveProfile()" class="oes-card oes-admin-profile__form" novalidate>
    <h3 class="oes-admin-profile__form-title">Account Details</h3>

    <mat-form-field appearance="outline" class="oes-admin-profile__field">
      <mat-label>Full name</mat-label>
      <input matInput formControlName="fullName" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="oes-admin-profile__field">
      <mat-label>Email address</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="oes-admin-profile__field">
      <mat-label>Department</mat-label>
      <input matInput formControlName="department" />
    </mat-form-field>

    <div class="oes-admin-profile__actions">
      <button mat-flat-button color="primary" type="submit">
        <mat-icon>save</mat-icon>
        Save Changes
      </button>
    </div>
  </form>
</div>
